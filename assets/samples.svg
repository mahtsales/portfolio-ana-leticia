<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Test tubes holder -->
  <rect x="60" y="120" width="80" height="15" fill="none" stroke="#d9689d" stroke-width="2.5" rx="3"/>
  
  <!-- Tube 1 -->
  <rect x="70" y="40" width="14" height="80" fill="none" stroke="#d9689d" stroke-width="2.5" rx="4"/>
  <path d="M 70 80 Q 70 100 70 120" fill="#f5b2cd" opacity="0.4"/>
  <circle cx="77" cy="95" r="2" fill="#d9689d"/>
  
  <!-- Tube 2 -->
  <rect x="93" y="35" width="14" height="85" fill="none" stroke="#d9689d" stroke-width="2.5" rx="4"/>
  <path d="M 93 70 Q 93 100 93 120" fill="#f5b2cd" opacity="0.5"/>
  <circle cx="100" cy="85" r="2.5" fill="#d9689d"/>
  <circle cx="100" cy="110" r="1.5" fill="#d9689d"/>
  
  <!-- Tube 3 -->
  <rect x="116" y="45" width="14" height="75" fill="none" stroke="#d9689d" stroke-width="2.5" rx="4"/>
  <path d="M 116 85 Q 116 105 116 120" fill="#f5b2cd" opacity="0.35"/>
  <circle cx="123" cy="100" r="2" fill="#d9689d"/>
  
  <!-- Labels on samples -->
  <text x="77" y="60" font-size="8" fill="#d9689d" text-anchor="middle" opacity="0.6">A</text>
  <text x="100" y="55" font-size="8" fill="#d9689d" text-anchor="middle" opacity="0.6">B</text>
  <text x="123" y="65" font-size="8" fill="#d9689d" text-anchor="middle" opacity="0.6">C</text>
</svg>